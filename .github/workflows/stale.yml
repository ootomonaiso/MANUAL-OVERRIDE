name: Stale

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stale:
    name: Mark & Close Stale
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-issue-stale: 30
          days-before-issue-close: 7
          days-before-pr-stale: 45
          days-before-pr-close: 14
          stale-issue-message: |
            このIssueは30日間更新がないため、staleとしてマークされました。
            7日以内に動きがなければ自動クローズされます。
            引き続き有効な場合はコメントを追加してください。
          close-issue-message: |
            90日間更新がなかったためこのIssueをクローズしました。
            必要であれば再オープンしてください。
          stale-pr-message: |
            このPRは45日間更新がないため、staleとしてマークされました。
            14日以内に動きがなければ自動クローズされます。
          close-pr-message: |
            長期間更新がなかったためこのPRをクローズしました。
            必要であれば再オープンしてください。
          exempt-issue-labels: 'pinned,security,bug,enhancement'
          exempt-pr-labels: 'pinned,security,work-in-progress,wip'
