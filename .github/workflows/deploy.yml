name: Deploy

on:
  # PR open/update → preview deployment
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

  # Push to main (after CI passes) → production
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target
        required: true
        default: production
        type: choice
        options: [production, preview]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

# ══════════════════════════════════════════════════════════
#  PR Preview deployment
# ══════════════════════════════════════════════════════════
jobs:
  preview:
    name: Preview Deploy (PR #${{ github.event.number }})
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      # Try to reuse CI build artifact; fall back to building here
      - name: Download CI artifact
        id: dl
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Build (artifact not available)
        if: steps.dl.outcome == 'failure'
        run: npm run build

      - name: Deploy preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-preview/pr-${{ github.event.number }}
          keep_files: true

      - name: Post preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            const prNum = context.issue.number;
            const sha = context.sha.slice(0, 7);
            const owner = repo.owner.toLowerCase();
            const repoName = repo.repo.toLowerCase();
            const url = `https://${owner}.github.io/${repoName}/pr-preview/pr-${prNum}/`;
            const marker = '<!-- preview-deploy -->';
            const body = `${marker}\n## 🚀 Preview Deployment\n\n| | |\n|---|---|\n| **URL** | ${url} |\n| **Commit** | \`${sha}\` |\n| **Status** | ✅ Ready |\n\n_プレビューはPRマージ後に自動削除されます_`;
            const { data: comments } = await github.rest.issues.listComments({
              ...repo, issue_number: prNum
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                ...repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                ...repo, issue_number: prNum, body
              });
            }

  # ══════════════════════════════════════════════════════════
  #  PR Closed → delete preview
  # ══════════════════════════════════════════════════════════
  cleanup-preview:
    name: Cleanup Preview (PR #${{ github.event.number }})
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove preview directory
        run: |
          DIR="pr-preview/pr-${{ github.event.number }}"
          if [ -d "$DIR" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$DIR"
            git commit -m "chore: remove preview for PR #${{ github.event.number }}"
            git push
          else
            echo "Preview dir not found, skipping"
          fi

  # ══════════════════════════════════════════════════════════
  #  Production deployment (push to main only)
  # ══════════════════════════════════════════════════════════
  production:
    name: Production Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      # Reuse CI artifact when available (same SHA → same build)
      - name: Download CI artifact
        id: dl
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Build (artifact not available)
        if: steps.dl.outcome == 'failure'
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
          full_commit_message: |
            deploy: ${{ github.sha }}

            ${{ github.event.head_commit.message }}

      - name: Post-deploy smoke check
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          URL="https://${OWNER}.github.io/${REPO}/"
          echo "Waiting 30s for Pages cache..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Pages returned HTTP $STATUS (may still be propagating)"
          else
            echo "✅ Pages is live: $URL"
          fi
